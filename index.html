<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Farming</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#4CAF50;
overflow:hidden;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:#202020;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#menu h1{
font-size:40px;
color:gold;
}

#menu button{
padding:15px 40px;
font-size:22px;
background:limegreen;
color:white;
border:none;
border-radius:10px;
}

#game{
display:none;
width:100%;
height:100vh;
position:relative;
background:#4CAF50;
}

#topbar{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#coins{
background:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

#shop{
background:gold;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

#player{
position:absolute;
left:150px;
top:220px;
font-size:48px;
}
</sty#joystick{
position:fixed;
left:20px;
bottom:20px;
width:120px;
height:120px;
background:rgba(255,255,255,0.25);
border:3px solid white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

#stick{
width:55px;
height:55px;
background:white;
border-radius:50%;
}le>

</head>

<body>

<div id="menu">

<h1>🪙 Bitcoin Farming</h1>

<p>
Mine Bitcoin, buy Crypto Cards,
and become the richest player!
</p>

<button onclick="playGame()">
▶ PLAY
</button>

</div>

<div id="game">

<div id="topbar">

<div id="coins">
Bitcoin: 0
</div>

<div id="shop">
🏪 Shop
</div>

</div>

<div id="player">
🧑
</div>

</div>

<script>

function playGame(){

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

}

</script>

</body>
</html>
