<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Farming</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(#1b1b1b,#0f4c2c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.menu{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:20px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 0 25px lime;
}

h1{
color:gold;
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
line-height:1.6;
}

button{
margin-top:20px;
padding:15px 50px;
font-size:22px;
background:limegreen;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:green;
transform:scale(1.05);
}

.small{
margin-top:20px;
font-size:14px;
color:#ccc;
}
</style>

</head>

<body>

<div class="menu">

<h1>🪙 Bitcoin Farming</h1>

<p>
Welcome to <b>Bitcoin Farming</b>! Build your own Bitcoin empire by mining coins,
buying powerful machines, upgrading your farm, and becoming the richest player.
Can you build the ultimate crypto farm?
</p>

<button onclick="startGame()">
▶ PLAY
</button>

<p class="small">
Version 0.1 Alpha
</p>

</div>

<script>
function startGame(){
alert("The game is coming next! We'll build it step by step.");
}
</script>

</body>
</html>
