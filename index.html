<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Farming</title>

<style>
body{
margin:0;
font-family:Arial;
background:#1a1a1a;
color:white;
text-align:center;
}

#menu{
padding-top:100px;
}

#game{
display:none;
padding-top:30px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:limegreen;
color:white;
margin:10px;
cursor:pointer;
}

#player{
font-size:80px;
}

#coins{
font-size:30px;
color:gold;
}
</style>

</head>
<body>

<div id="menu">

<h1>🪙 Bitcoin Farming</h1>

<p>
Welcome to Bitcoin Farming! Mine Bitcoin, buy upgrades,
and become the richest farmer!
</p>

<button onclick="playGame()">▶ PLAY</button>

</div>

<div id="game">

<div id="player">🧑‍🌾</div>

<h2>Bitcoin</h2>

<div id="coins">0</div>

<button onclick="mine()">⛏️ Mine</button>

<button onclick="alert('Shop Coming Soon!')">
🛒 Shop
</button>

<button onclick="alert('Gear Coming Soon!')">
⚙️ Gear
</button>

</div>

<script>

let bitcoin=0;

function playGame(){

document.getElementById("menu").style.display="none";

document.getElementById("game").style.display="block";

}

function mine(){

bitcoin++;

document.getElementById("coins").innerHTML=bitcoin;

}

</script>

</body>
</html>
